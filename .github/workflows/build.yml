name: Build MT7987A (Hiveton / EdgePi) + ImageBuilder

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "OpenWrt release tag to build against (without the leading v)"
        required: true
        default: "25.12.5"
      make_release:
        description: "Publish the built images as a GitHub Release"
        type: boolean
        default: false
  push:
    paths:
      - "files/**"
      - "apply.sh"
      - ".github/workflows/build.yml"

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # push events have no inputs.tag, fall back to a default
  TAG: ${{ github.event.inputs.tag || '25.12.5' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout overlay (apply.sh + files)
        uses: actions/checkout@v4

      - name: Free up disk space (~25 GB)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" \
            /usr/local/lib/node_modules /usr/share/swift || true
          sudo apt-get -y purge '^dotnet-.*' '^llvm-.*' '^mysql-.*' \
            azure-cli google-cloud-cli firefox 2>/dev/null || true
          sudo apt-get -y autoremove --purge
          sudo apt-get clean
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            python3-pyelftools aria2 zstd libelf-dev

      - name: Download OpenWrt source
        id: src
        run: |
          set -euo pipefail
          wget -q "https://github.com/openwrt/openwrt/archive/refs/tags/v${TAG}.tar.gz"
          tar xzf "v${TAG}.tar.gz" -C "$HOME/"
          DIR=$(tar tzf "v${TAG}.tar.gz" | head -1 | cut -d/ -f1)
          echo "dir=$HOME/$DIR" >> "$GITHUB_OUTPUT"
          echo "extracted to $HOME/$DIR"

      - name: Switch feeds to GitHub mirrors + update
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          set -euo pipefail
          sed -i -E 's#git.openwrt.org/(openwrt|feed|project)#github.com/openwrt#g' feeds.conf.default
          sed -i '\#https://ftpmirror\.gnu\.org#d' scripts/projectsmirrors.json
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply Hiveton/EdgePi overlay
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          set -euo pipefail
          "$GITHUB_WORKSPACE/apply.sh" .
          # sanity check: the three DTS are in place
          ls -1 target/linux/mediatek/dts/mt7987a-edgepi-e87n.dts \
                 target/linux/mediatek/dts/mt7987a-hiveton-h5000m.dts \
                 target/linux/mediatek/dts/mt7987a-hiveton-h5s-te42.dts

      - name: Generate .config
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          set -euo pipefail
          # bump base-files PKG_RELEASE so the build never looks "older"
          sed -i 's/PKG_RELEASE:=$(COMMITCOUNT)/PKG_RELEASE:=99999999/' package/base-files/Makefile

          # seed with the official filogic config (official kernel config + kmods)
          BASE="https://downloads.openwrt.org/releases/${TAG}/targets/mediatek/filogic/config.buildinfo"
          if ! curl -fSL "$BASE" -o .config; then
            echo "::warning::no config.buildinfo for release ${TAG}, falling back to 25.12-SNAPSHOT"
            curl -fSL "https://downloads.openwrt.org/releases/25.12-SNAPSHOT/targets/mediatek/filogic/config.buildinfo" -o .config
          fi

          # disable every official device...
          sed -i -E 's/^(CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_[^=]*)=y/\1=n/' .config

          # ...and enable only our three + ImageBuilder
          cat >> .config <<'EOF'
CONFIG_TARGET_MULTI_PROFILE=y
CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_edgepi_e87n=y
CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_hiveton_h5000m=y
CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_hiveton_h5s-te42=y
CONFIG_IB=y
EOF

          make defconfig
          echo "=== selected devices ==="
          grep -E 'CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_(edgepi_e87n|hiveton_h5000m|hiveton_h5s-te42)=y' .config
          grep -q '^CONFIG_IB=y' .config && echo "ImageBuilder: ON"

      - name: Download package sources
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          make -j$(nproc) download || make -j1 download
          df -h /

      - name: Build
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          # parallel build first; on failure retry single-threaded with verbose log
          make -j$(nproc) || make -j1 V=s
          df -h /

      - name: Collect artifacts
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$OUT"
          BIN=bin/targets/mediatek/filogic
          cp -v "$BIN"/*sysupgrade*   "$OUT/" 2>/dev/null || true
          cp -v "$BIN"/*imagebuilder* "$OUT/" 2>/dev/null || true
          cp -v "$BIN"/*.buildinfo    "$OUT/" 2>/dev/null || true
          cp -v "$BIN"/sha256sums     "$OUT/" 2>/dev/null || true
          echo "=== artifacts ==="
          ls -lh "$OUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hiveton-edgepi-mt7987-${{ env.TAG }}
          path: artifacts/*
          if-no-files-found: error

      - name: Publish Release (optional)
        if: ${{ github.event.inputs.make_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REL="v${TAG}-hiveton"
          gh release create "$REL" artifacts/* \
            --title "MT7987A firmware ($TAG)" \
            --notes "Hiveton H5000M / H5S TE-42 + EdgePi E87N, based on OpenWrt $TAG, ImageBuilder included." \
          || gh release upload "$REL" artifacts/* --clobber
